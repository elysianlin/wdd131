<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RecipesBook</title>
    <link rel="stylesheet" href="recipes.css" />

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="RecipeBook ">
    <meta property="og:description" content="Discover simple and delicious recipes beautifully organized in one cozy place.">
    <meta property="og:url" content="https://yourgithubusername.github.io/wdd131/recipes/">
    <meta property="og:image" content="https://yourgithubusername.github.io/wdd131/recipes/images/social-preview-1200x630.png">

    <!-- X (Twitter) Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="RecipeBook">
    <meta name="twitter:description" content="Discover simple and delicious recipes beautifully organized in one cozy place.">
    <meta name="twitter:image" content="https://yourgithubusername.github.io/wdd131/recipes/images/social-preview-1200x630.png">

    <!-- Favicon -->
    <link rel="icon" href="favicon.ico">

    <!-- Apple Touch Icon (180x180) -->
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
                    
  </head>
  <body>
    <header>
        <div class="logo-area">
            <img src="images/book.png" alt="RecipesBook Logo" class="logo">
            <h1> RECIPEBOOK</h1>
        </div>
        <div class="search-area">
            <input type="text" placeholder="Find a recipe">
            <button aria-label="Search"><img src="images/glass.png" alt="search icon"></button>
        </div>
    </header>
    <mian>
        <section class="recipe-card">
            <img src="images/Bibimbap.jpg" alt="Bibimbap" class="recipe-img">
            <div class="recipe-content">
                <span class="tag">Korean</span>
                <h2>Bibimbap</h2>
                <span
                class="rating"
                role="img"
                aria-label="Rating: 4 out of 5 stars"
                >
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star-empty">☆</span>
                </span>
                <p class="description">A traditional Korean mixed rice dish with vegetables and meat.</p>
            </div>
        </section>
    </main>
    <footer>
        <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
            <a href="#"><img src="images/instagram.png" alt="instagram icon"></a>
            <a href="#"><img src="images/youtube.png" alt="youtube icon"></a>
            <a href="#"><img src="images/pinterest.png" alt="pinterest icon"></a>
        </div>    
        <p><a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a></p>
    </footer>
</body>
</html>
